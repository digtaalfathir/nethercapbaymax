; nethercap — ESP8266 (Wemos D1 Mini) WiFi security research tool
; Build & upload:  PlatformIO IDE (VSCode) atau CLI `pio run -t upload`

[env:d1_mini]
platform        = espressif8266
board           = d1_mini
framework       = arduino

; Patch SDK: buka blokir injection deauth/disassoc (lihat patch_sdk.py)
extra_scripts   = pre:patch_sdk.py

; Serial monitor
monitor_speed   = 115200
monitor_filters = esp8266_exception_decoder, time

; Upload — kalau 921600 gagal/aneh, turunkan ke 115200
upload_speed    = 921600

; Library tampilan
lib_deps        =
    bodmer/TFT_eSPI@^2.5.43

; build flags: versi + konfigurasi TFT_eSPI (ST7789 240x280, tanpa edit User_Setup.h)
build_flags     =
    -D NETHERCAP_VERSION=\"0.2.0\"
    ; --- TFT_eSPI: ST7789 240x280 di Wemos D1 Mini (hardware SPI) ---
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=280
    -D TFT_CS=15          ; D8  (GPIO15)
    -D TFT_DC=4           ; D2  (GPIO4)
    -D TFT_RST=16         ; D0  (GPIO16)
    -D TFT_BL=-1          ; BLK ke 3V3 langsung (tak dikontrol)
    ; SCK=GPIO14(D5) & MOSI=GPIO13(D7) otomatis (HSPI ESP8266)
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SPI_FREQUENCY=40000000
    ; Kalau warna terbalik (negatif): tambah -D TFT_INVERSION_OFF=1
    ; Kalau merah<->biru ketuker:      tambah -D TFT_RGB_ORDER=TFT_BGR
    ; Kalau gambar bergeser ~20px:     coba ganti rotation di ui.cpp
